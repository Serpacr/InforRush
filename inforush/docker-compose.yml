version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: inforush-db
    environment:
      POSTGRES_DB: inforush
      POSTGRES_USER: inforush
      POSTGRES_PASSWORD: inforush123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inforush"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inforush-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inforush-backend
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/inforush
      DB_USER: inforush
      DB_PASSWORD: inforush123
      JWT_SECRET: inforush-super-secret-jwt-key-mude-em-producao-2024
      PORT: 8080
      FRONTEND_URL: http://localhost:5173
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inforush-net
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inforush-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - inforush-net
    restart: on-failure

  sonarqube:
    image: sonarqube:lts
    container_name: sonarqube
    ports:
      - "9000:9000"
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    networks:
      - inforush-net

volumes:
  postgres_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:

networks:
  inforush-net:
    driver: bridge
