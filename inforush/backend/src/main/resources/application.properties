spring.application.name=inforush-backend

# Database
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/inforush}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET:inforush-super-secret-jwt-key-mude-em-producao-2024}
jwt.expiration=604800000

# Server
server.port=${PORT:8080}

# CORS
cors.allowed-origins=${FRONTEND_URL:http://localhost:5173}

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operationsSorter=method